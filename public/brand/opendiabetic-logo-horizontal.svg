<svg xmlns="http://www.w3.org/2000/svg" width="980" height="240" viewBox="0 0 980 240" role="img" aria-labelledby="title desc">
  <title id="title">OpenDiabetic logo</title>
  <desc id="desc">OpenDiabetic bee mark with two-tone OpenDiabetic wordmark.</desc>
  <rect width="980" height="240" rx="48" fill="#ffffff"/>
  <g transform="translate(42 42)">
    <rect width="156" height="156" rx="42" fill="#fff3c4" stroke="#f2b632" stroke-width="8"/>
    <circle cx="120" cy="38" r="24" fill="#d8f3eb"/>
    <text x="78" y="105" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif" font-size="78">🐝</text>
  </g>
  <text x="235" y="116" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="900" letter-spacing="0">
    <tspan fill="#073f3b">Open</tspan><tspan fill="#c47b00">Diabetic</tspan>
  </text>
  <text x="239" y="164" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Privacy-first compute for diabetic life</text>
</svg>
